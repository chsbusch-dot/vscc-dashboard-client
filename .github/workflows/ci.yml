name: Frontend CI

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

jobs:
  build:
    name: Build and Typecheck
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: ./vscc-dashboard-client

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: ./vscc-dashboard-client/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build project
        run: npm run build
